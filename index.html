<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvoiceCraft - Professional Free Invoice Generator | Created by arundidauli</title>
    <meta name="description" content="Generate professional invoices for free with InvoiceCraft. Built by arundidauli. Simple, fast, and secure invoice maker with PDF export and print support.">
    <meta name="keywords" content="invoice generator, arundidauli, free invoice maker, professional invoice, business receipts, PDF invoice, browser-based invoice, open source invoice">
    
    <!-- SEO & Social Media -->
    <meta property="og:title" content="InvoiceCraft - Professional Invoice Generator by arundidauli">
    <meta property="og:description" content="Create, save, and download professional invoices directly in your browser. Built by arundidauli.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="InvoiceCraft - Invoice Generator by arundidauli">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%234F46E5%22/><path d=%22M30 30h20v20H30zM50 30h20v20H50zM30 50h20v20H30zM50 60h20v5H50zM50 70h20v5H50z%22 fill=%22white%22 opacity=%22.9%22/></svg>">
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
</head>
<body>

<div class="app">

<div class="sidebar">
  <div class="top-bar">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><line x1="9" y1="11.5" x2="14" y2="11.5"/><line x1="11.5" y1="9" x2="11.5" y2="14"/></svg>
    </div>
    <div class="logo-text">Invoice<span>Craft</span></div>
    <div class="ctrl-group">
      <select class="ctrl" id="langSel" onchange="applyLang()">
        <option value="en">English</option>
        <option value="hi">Hinglish</option>
      </select>
      <select class="ctrl" id="currSel" onchange="updatePreview()">
        <option value="INR">INR</option>
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
        <option value="GBP">GBP</option>
      </select>
      <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">Light</button>
    </div>
  </div>

  <div class="form-body">
    <div class="tabs">
      <div class="tab on" onclick="showTab('form',this)" data-en="New Invoice" data-hi="Naya Invoice">New Invoice</div>
      <div class="tab" onclick="showTab('saved',this)" data-en="Saved" data-hi="Pichle Bills">Saved</div>
    </div>

    <div class="pane on" id="pane-form">

      <div class="summary-bar">
        <div class="sum-block"><div class="lbl" data-en="Subtotal" data-hi="Subtotal">Subtotal</div><div class="val" id="sS">—</div></div>
        <div class="sum-block accent"><div class="lbl" data-en="Tax" data-hi="Tax">Tax</div><div class="val" id="sT">—</div></div>
        <div class="sum-block"><div class="lbl" data-en="Grand Total" data-hi="Kul Total">Grand Total</div><div class="val" id="sG">—</div></div>
      </div>

      <div class="sec-head" data-en="QUICK FILL" data-hi="AUTO FILL">QUICK FILL</div>
      <div class="quick-row">
        <div class="q-chip" onclick="qf('macbook')">MacBook Pro</div>
        <div class="q-chip" onclick="qf('iphone')">iPhone 15 Pro</div>
        <div class="q-chip" onclick="qf('airpods')">AirPods Pro</div>
        <div class="q-chip" onclick="qf('ps5')">PS5</div>
        <div class="q-chip" onclick="qf('repair')">Repair Job</div>
        <div class="q-chip" onclick="qf('freelance')">Freelance</div>
      </div>

      <div class="sec-head" data-en="INVOICE DETAILS" data-hi="INVOICE KI DETAILS">INVOICE DETAILS</div>
      <div class="grid-3">
        <div class="field"><label data-en="Invoice No." data-hi="Invoice No.">Invoice No.</label><input class="inp" id="invNo" value="INV-2024-001" oninput="updatePreview()"/></div>
        <div class="field"><label data-en="Date" data-hi="Tarikh">Date</label><input class="inp" type="date" id="invDate" oninput="updatePreview();calcW()"/></div>
        <div class="field"><label data-en="Due Date" data-hi="Due Tarikh">Due Date</label><input class="inp" type="date" id="dueDate" oninput="updatePreview()"/></div>
      </div>
      <div class="grid-2">
        <div class="field"><label data-en="Payment" data-hi="Payment">Payment</label>
          <select class="inp" id="payM" onchange="updatePreview()"><option>UPI</option><option>Card</option><option>Cash</option><option>Bank Transfer</option><option>Cheque</option></select>
        </div>
        <div class="field"><label data-en="Category" data-hi="Category">Category</label>
          <select class="inp" id="cat" onchange="updatePreview()">
            <option>Laptop / MacBook</option><option>Mobile / iPhone</option><option>Accessories</option>
            <option>Repair Service</option><option>Gaming Console</option><option>Camera / Electronics</option>
            <option>Freelance Work</option><option>Rental / Misc</option><option>Custom</option>
          </select>
        </div>
      </div>

      <div class="sec-head" data-en="FROM" data-hi="BHEJNA WALA">FROM</div>
      <div class="field"><label data-en="Business Name" data-hi="Dukan ka Naam">Business Name</label><input class="inp" id="sellerName" placeholder="e.g. TechZone Store" oninput="updatePreview()"/></div>
      <div class="grid-2">
        <div class="field"><label data-en="UPI / Phone" data-hi="UPI / Phone">UPI / Phone</label><input class="inp" id="sellerContact" placeholder="store@upi" oninput="updatePreview()"/></div>
        <div class="field"><label data-en="GST No." data-hi="GST No.">GST No.</label><input class="inp" id="sellerGST" placeholder="22AAAA..." oninput="updatePreview()"/></div>
      </div>

      <div class="sec-head" data-en="TO" data-hi="LENE WALA">TO</div>
      <div class="grid-2">
        <div class="field"><label data-en="Customer Name" data-hi="Grahak ka Naam">Customer Name</label><input class="inp" id="custName" placeholder="Full name" oninput="updatePreview()"/></div>
        <div class="field"><label data-en="Phone / Email" data-hi="Phone / Email">Phone / Email</label><input class="inp" id="custContact" placeholder="+91 or email" oninput="updatePreview()"/></div>
      </div>
      <div class="field"><label data-en="Address" data-hi="Pata">Address</label><input class="inp" id="custAddr" placeholder="City, State (optional)" oninput="updatePreview()"/></div>

      <div class="sec-head" data-en="LINE ITEMS" data-hi="SAMAN / KAAM">LINE ITEMS</div>
      <div class="items-wrap">
        <table class="items-tbl">
          <thead><tr>
            <th data-en="Description" data-hi="Kya hai" style="min-width:110px">Description</th>
            <th data-en="IMEI / Serial" data-hi="IMEI / No." style="min-width:80px">IMEI / Serial</th>
            <th data-en="Qty" data-hi="Qty" style="width:40px">Qty</th>
            <th data-en="Price" data-hi="Daam" style="width:78px">Price</th>
            <th style="width:28px"></th>
          </tr></thead>
          <tbody id="iBody"></tbody>
        </table>
      </div>
      <button class="add-row-btn" id="addBtn" onclick="addItem()">Add item</button>

      <div class="sec-head" data-en="PRICING" data-hi="HISAAB">PRICING</div>
      <div class="grid-3">
        <div class="field"><label data-en="Tax %" data-hi="Tax %">Tax %</label><input class="inp" type="number" id="taxP" value="18" min="0" max="100" oninput="updatePreview()"/></div>
        <div class="field"><label data-en="Discount %" data-hi="Chhoot %">Discount %</label><input class="inp" type="number" id="discP" value="0" min="0" max="100" oninput="updatePreview()"/></div>
        <div class="field"><label data-en="Warranty (mo.)" data-hi="Warranty (mahine)">Warranty (mo.)</label><input class="inp" type="number" id="warM" value="12" min="0" oninput="calcW()"/></div>
      </div>
      <div class="warranty-pill" id="wPill"><span data-en="Warranty expires" data-hi="Warranty khatam hogi">Warranty expires</span>: <strong id="wExp"></strong></div>

      <div class="sec-head" data-en="NOTES" data-hi="NOTES">NOTES</div>
      <div class="field"><label data-en="Notes / Terms / Warranty" data-hi="Notes / Terms / Warranty">Notes / Terms / Warranty</label>
        <textarea class="inp" id="notes" placeholder="e.g. 1 year manufacturer warranty. Return within 7 days." oninput="updatePreview()"></textarea>
      </div>
      <div class="field"><label data-en="Signature (Optional)" data-hi="Signature (Optional)">Signature (Optional)</label>
        <input class="inp" id="signature" placeholder="e.g. Authorized Signatory" oninput="updatePreview()"/>
      </div>

      <div class="sidebar-footer">
        Created by <a href="https://github.com/arundidauli" target="_blank">arundidauli</a>
      </div>
    </div>

    <div class="pane" id="pane-saved">
      <div id="savedList"></div>
    </div>
  </div>
</div>

<div class="preview-pane">
  <div class="prev-bar">
    <div class="prev-label" data-en="LIVE PREVIEW" data-hi="LIVE PREVIEW">LIVE PREVIEW</div>
    <div class="tpl-strip">
      <button class="tpl-btn on" onclick="setTpl('minimal',this)">Minimal</button>
      <button class="tpl-btn" onclick="setTpl('apple',this)">Apple</button>
      <button class="tpl-btn" onclick="setTpl('business',this)">Business</button>
      <button class="tpl-btn" onclick="setTpl('dark',this)">Dark</button>
    </div>
  </div>
  <div class="inv-canvas"><div class="inv" id="inv"></div></div>
  
  <div class="action-bar">
    <button class="btn-ghost" onclick="saveInv()" id="btnSave">Save</button>
    <button class="btn-ghost" onclick="printInv()">Print</button>
    <button class="btn-ghost" onclick="shareApp()">Share</button>
    <button class="btn-ghost" onclick="dupeInv()">Duplicate</button>
    <button class="btn-ghost" onclick="clearForm()">Clear</button>
    <button class="btn-main" onclick="dlPDF()" id="btnDL">Download PDF</button>
  </div>
</div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="constants.js"></script>
<script src="script.js"></script>
</body>
</html>
